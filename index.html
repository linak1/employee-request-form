
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة موظف جديد - Orange Bed & Bath</title>

<script>

// منع فتح الصفحة بدون تسجيل دخول

if(localStorage.getItem("loggedIn") !== "true"){
window.location = "login.html";
}

</script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
width:420px;
padding:30px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:14px;
margin-top:8px;
border:1px solid #ccc;
border-radius:8px;
font-size:18px;
height:50px;
box-sizing:border-box;
}
  
input[type="date"]{
font-size:18px;
height:50px;
} 

button{
width:100%;
margin-top:20px;
padding:12px;
background:#1f6feb;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1559c1;
}

.logout{
background:#888;
margin-top:10px;
}

.message{
text-align:center;
margin-top:15px;
color:green;
}

.manager{
text-align:center;
margin-bottom:10px;
font-size:14px;
color:#444;
}

</style>

</head>

<body>

<div class="container">

<h2>إدارة الموظفين</h2>

<div class="manager">
المدير: <span id="managerName"></span>
</div>

<form id="employeeForm">

<label>اسم الموظف الكامل</label>
<input type="text" id="employeeName" required>

<label>رقم الموظف</label>
<input type="number" id="employeeNumber" required>

<label>المطلوب</label>
<select id="requestType" required>

<option value="" disabled selected>اختر المطلوب</option>

<option value="إضافة موظف جديد">إضافة موظف جديد</option>

<option value="حذف موظف">حذف موظف</option>

<option value="نقل موظف">نقل موظف</option>

</select>

<div id="startDateField" style="display:none;">

<label>تاريخ المباشرة</label>
<input type="date" id="startDate">

</div>

<label>اسم معرض المباشرة</label>
<select id="Outlet" required>
<option value="">اختر المعرض</option>
</select>

<div id="newOutletField" style="display:none;">

<label>المعرض الجديد</label>
<select id="newOutlet">
<option value="">اختر المعرض الجديد</option>
</select>

</div>

<button type="submit">إرسال</button>

<button type="button" class="logout" onclick="logout()">تسجيل الخروج</button>

</form>

<div class="message" id="message"></div>

</div>

<script>

// عرض اسم المدير

document.getElementById("managerName").innerText =
localStorage.getItem("manager");


// تحميل المعارض الخاصة بالمدير

let outlets = JSON.parse(localStorage.getItem("outlets"));

let select = document.getElementById("Outlet");
let newSelect = document.getElementById("newOutlet");

if(outlets){

outlets.forEach(function(o){

let option = document.createElement("option");

option.value = o;
option.text = o;

select.appendChild(option);

let option2 = document.createElement("option");

option2.value = o;
option2.text = o;

newSelect.appendChild(option2);

});

}


// ارسال الطلب

document.getElementById("employeeForm").addEventListener("submit", function(e){

e.preventDefault();

let data = {

employeeName: document.getElementById("employeeName").value,
employeeNumber: document.getElementById("employeeNumber").value,
requestType: document.getElementById("requestType").value,
startDate: document.getElementById("startDate").value,
outlet: document.getElementById("Outlet").value,
newOutlet: document.getElementById("newOutlet").value,
manager: localStorage.getItem("manager")

};

fetch("https://script.google.com/macros/s/AKfycbye-4qiKSR9xq9MmZ_piv7AroXWZMoGEwEas-kFOcGZD9qb_EqWJh_j3MwRsyzjWsiuFw/exec",{

method:"POST",
body: JSON.stringify(data)

})
.then(res=>res.json())
.then(response=>{

document.getElementById("message").innerText =
"تم إرسال الطلب بنجاح";

document.getElementById("employeeForm").reset();

});

});

document.getElementById("requestType").addEventListener("change", function(){

var value = this.value;

var dateField = document.getElementById("startDateField");
var newOutletField = document.getElementById("newOutletField");

if(value === "إضافة موظف جديد"){

dateField.style.display = "block";
newOutletField.style.display = "none";

}

else if(value === "نقل موظف"){

dateField.style.display = "none";
newOutletField.style.display = "block";

}

else{

dateField.style.display = "none";
newOutletField.style.display = "none";

}

});
  
// تسجيل الخروج

function logout(){

localStorage.clear();
window.location="login.html";

}

</script>
  

</body>
</html>
