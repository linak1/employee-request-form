<script>
alert("SCRIPT LOADED");
    
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbye-4qiKSR9xq9MmZ_piv7AroXWZMoGEwEas-kFOcGZD9qb_EqWJh_j3MwRsyzjWsiuFw/exec";
console.log("Using URL:", SCRIPT_URL);
    
document.getElementById("employeeForm").addEventListener("submit", function(e){
  e.preventDefault();

  let formData = new FormData();
  formData.append("EmployeeName", document.getElementById("EmployeeName").value);
  formData.append("EmployeeNumber", document.getElementById("EmployeeNumber").value);
  formData.append("RequestType", document.getElementById("RequestType").value);
  formData.append("StartDate", document.getElementById("StartDate").value);
  formData.append("Outlet", document.getElementById("Outlet").value);

  fetch(SCRIPT_URL,{
    method:"POST",
    body:formData
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="duplicate"){
      document.getElementById("message").innerText="⚠️ الاسم أو الرقم موجود مسبقاً";
    } else {
      document.getElementById("message").innerText="✅ تم إرسال الطلب بنجاح";
      document.getElementById("employeeForm").reset();
    }
  })
  .catch(()=>{
    document.getElementById("message").innerText="❌ حدث خطأ";
  });
});
</script>
