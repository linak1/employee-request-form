
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إضافة موظف جديد - Orange Bed & Bath</title>

<script>

// منع فتح الصفحة بدون تسجيل دخول

if(localStorage.getItem("loggedIn") !== "true"){
window.location = "login.html";
}

</script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:#fff;
width:420px;
padding:30px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
margin-top:20px;
padding:12px;
background:#1f6feb;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1559c1;
}

.logout{
background:#888;
margin-top:10px;
}

.message{
text-align:center;
margin-top:15px;
color:green;
}

.manager{
text-align:center;
margin-bottom:10px;
font-size:14px;
color:#444;
}

</style>

</head>

<body>

<div class="container">

<h2>إدارة الموظفين</h2>

<div class="manager">
المدير: <span id="managerName"></span>
</div>

<form id="employeeForm">

<label>اسم الموظف الكامل</label>
<input type="text" id="employeeName" required>

<label>رقم الموظف</label>
<input type="number" id="employeeNumber" required>

<label>المطلوب</label>
<select id="requestType" required>
<option value="">اختر المطلوب</option>
<option value="إضافة موظف">إضافة موظف</option>
<option value="حذف موظف">حذف موظف</option>
</select>

<label>تاريخ المباشرة</label>
<input type="date" id="startDate" required>

<label>اسم معرض المباشرة</label>
<select id="Outlet" required>
<option value="">اختر المعرض</option>
</select>

<button type="submit">إرسال</button>

<button type="button" class="logout" onclick="logout()">تسجيل الخروج</button>

</form>

<div class="message" id="message"></div>

</div>

<script>

// عرض اسم المدير

document.getElementById("managerName").innerText =
localStorage.getItem("manager");


// تحميل المعارض الخاصة بالمدير

let outlets = JSON.parse(localStorage.getItem("outlets"));

let select = document.getElementById("Outlet");

if(outlets){

outlets.forEach(function(o){

let option = document.createElement("option");

option.value = o;
option.text = o;

select.appendChild(option);

});

}


// ارسال الطلب

document.getElementById("employeeForm").addEventListener("submit", function(e){

e.preventDefault();

let data = {

employeeName: document.getElementById("employeeName").value,
employeeNumber: document.getElementById("employeeNumber").value,
requestType: document.getElementById("requestType").value,
startDate: document.getElementById("startDate").value,
outlet: document.getElementById("Outlet").value,
manager: localStorage.getItem("manager")

};

fetch("PUT_YOUR_SCRIPT_URL_HERE",{

method:"POST",
body: JSON.stringify(data)

})
.then(res=>res.json())
.then(response=>{

document.getElementById("message").innerText =
"تم إرسال الطلب بنجاح";

document.getElementById("employeeForm").reset();

});

});


// تسجيل الخروج

function logout(){

localStorage.clear();
window.location="login.html";

}

</script>

</body>
</html>
