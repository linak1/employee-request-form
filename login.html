
<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<img src="logo.png.jpg" class="logo">
<title>تسجيل دخول المدراء - Orange Bed & Bath</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:white; 
width:90%; 
max-width:420px;
padding:30px;
border-radius:12px; 
box-shadow:0 4px 15px rgba(0,0,0,0.1); 
text-align:center;
}

input{
width:100%; 
padding:14px;
margin-top:10px;
border:1px solid #ccc; 
border-radius:6px; 
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#ff7a00;
border:none;
color:white;
font-size:17px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#e66d00;
}

.logo{
display:block;
margin:auto;
width:140px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="box">

<h2>تسجيل دخول المدراء</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn" onclick="login()">تسجيل الدخول</button>

</div>

<script>

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

fetch("https://script.google.com/macros/s/AKfycbye-4qiKSR9xq9MmZ_piv7AroXWZMoGEwEas-kFOcGZD9qb_EqWJh_j3MwRsyzjWsiuFw/exec?username="+user+"&password="+pass)

.then(res => res.json())

.then(data => {

if(data.status == "ok"){

localStorage.setItem("loggedIn","true");

localStorage.setItem("manager", user);

localStorage.setItem("outlets", JSON.stringify(data.outlets));

window.location = "index.html";

}else{

alert("اسم المستخدم أو كلمة المرور غير صحيحة");

}

});

}

</script>

</body>
</html>
