
<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<title>تسجيل دخول المدراء - Orange Bed & Bath</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#1f6feb;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1559c1;
}

</style>

</head>

<body>

<div class="box">

<h2>تسجيل دخول المدراء</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">تسجيل الدخول</button>

</div>

<script>

function login(){

let user = document.getElementById("username").value;
let pass = document.getElementById("password").value;

fetch("https://script.google.com/macros/s/AKfycbye-4qiKSR9xq9MmZ_piv7AroXWZMoGEwEas-kFOcGZD9qb_EqWJh_j3MwRsyzjWsiuFw/exec"username="+user+"&password="+pass)

.then(res => res.json())

.then(data => {

if(data.status == "ok"){

localStorage.setItem("loggedIn","true");

localStorage.setItem("manager", user);

localStorage.setItem("outlets", JSON.stringify(data.outlets));

window.location = "index.html";

}else{

alert("اسم المستخدم أو كلمة المرور غير صحيحة");

}

});

}

</script>

</body>
</html>
